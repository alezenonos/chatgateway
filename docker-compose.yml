services:
  backend:
    build: ./backend
    env_file: .env
    volumes:
      - ./config:/app/config:ro
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
